# Docker Compose for Directus + PostgreSQL
# Location: /opt/{project-name}/docker-compose.yml
#
# Environment variables from .env or Doppler:
# - POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
# - DIRECTUS_KEY, DIRECTUS_SECRET
# - DIRECTUS_ADMIN_EMAIL, DIRECTUS_ADMIN_PASSWORD

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      # Security
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}

      # Database
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Admin user (created on first run)
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      # Optional: Public URL for CORS/redirects
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8055}

      # Caching (optional, improves performance)
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: memory

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
