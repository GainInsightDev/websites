# Amplify Build Configuration
# Location: amplify.yml (project root)
#
# This configures how Amplify builds and deploys your Next.js app.

version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm ci
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
