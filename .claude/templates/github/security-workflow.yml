# Security scanning workflow snippet
# Add these steps to your existing CI workflow after the install step

# Option 1: Standalone security job
security:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security audit
      run: npm audit --audit-level=high

# Option 2: Add to existing job (recommended)
# Add this step after your "npm ci" or "npm install" step:
#
#     - name: Security audit
#       run: npm audit --audit-level=high

# Option 3: With audit fix attempt (for PRs)
# Useful in PR workflows to auto-fix and commit:
#
#     - name: Security audit and fix
#       run: |
#         npm audit --audit-level=high || npm audit fix
#         git diff --quiet || echo "::warning::Dependencies were updated by npm audit fix"
